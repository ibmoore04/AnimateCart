<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands | AnimateCart</title>
    <link rel="icon" href="./anime.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --deep-indigo: #1a1a3d;
            --soft-glow: #5f4b8b;
            --golden: #ffb347;
            --bg-primary: #fcfcff;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a3d;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            --deep-indigo: #6b5b95;
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --card-bg: #2d2d2d;
            --border-color: #404040;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .navbar {
            background: var(--bg-secondary) !important;
        }

        [data-theme="dark"] .nav-link {
            color: #e0e0e0 !important;
        }

        .brand-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            transition: all 0.3s;
            cursor: pointer;
        }

        .brand-card:hover {
            transform: scale(1.05);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="bi bi-bag-heart-fill me-2"></i>
                <span
                    style="background: linear-gradient(145deg, var(--deep-indigo), var(--soft-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AnimateCart</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-semibold gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="deals.html">Deals</a></li>
                    <li class="nav-item"><a class="nav-link" href="stories.html">Stories</a></li>
                    <li class="nav-item"><a class="nav-link active" href="brands.html">Brands</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <div class="theme-toggle me-2" id="themeToggle">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </div>
                    <a href="cart.html" class="btn btn-outline-dark rounded-pill">
                        <i class="bi bi-cart3"></i> <span id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-5" style="background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);">
        <div class="container text-center">
            <h1 class="display-4 fw-bold">🏷️ Featured Brands</h1>
            <p class="lead">Shop from the world's most trusted names</p>
        </div>
    </section>

    <section class="container py-5">
        <div class="row g-4">
            <div class="col-md-3" data-aos="flip-up">
                <div class="brand-card text-center p-4 rounded-4">
                    <img src="https://elements-resized.envatousercontent.com/envato-dam-assets-production/EVA/TRX/94/84/64/53/e7/v1_E10/E10AJQUI.JPG?w=200"
                        class="img-fluid mb-3" style="max-height: 80px;">
                    <h5>TechCore</h5>
                    <p class="text-muted small">Electronics</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="100">
                <div class="brand-card text-center p-4 rounded-4">
                    <img src="https://images.pexels.com/photos/326501/pexels-photo-326501.jpeg?w=200"
                        class="img-fluid mb-3" style="max-height: 80px;">
                    <h5>UrbanStyle</h5>
                    <p class="text-muted small">Fashion</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="200">
                <div class="brand-card text-center p-4 rounded-4">
                    <img src="https://images.pexels.com/photos/1036641/pexels-photo-1036641.jpeg?w=200"
                        class="img-fluid mb-3" style="max-height: 80px;">
                    <h5>HomeLux</h5>
                    <p class="text-muted small">Home & Living</p>
                </div>
            </div>
            <div class="col-md-3" data-aos="flip-up" data-aos-delay="300">
                <div class="brand-card text-center p-4 rounded-4">
                    <img src="https://elements-resized.envatousercontent.com/envato-dam-assets-production/EVA/TRX/3d/5b/c8/7f/a5/v1_E10/E109U3CU.jpg?w=200"
                        class="img-fluid mb-3" style="max-height: 80px;">
                    <h5>BookWorm</h5>
                    <p class="text-muted small">Books</p>
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-dark text-white pt-4 pb-3 mt-5">
        <div class="container text-center">
            <p>© 2026 AnimateCart. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        let cart = JSON.parse(localStorage.getItem('cart')) || [];
        document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + (i.quantity || 1), 0);

        function initDarkMode() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
            }
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    themeIcon.classList.replace('bi-sun', 'bi-moon-stars');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }
        initDarkMode();
    </script>
</body>

</html>
