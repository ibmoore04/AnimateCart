<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deals | AnimateCart</title>
    <link rel="icon" href="./anime.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        /* Copy same styles from products.html */
        :root {
            --deep-indigo: #1a1a3d;
            --soft-glow: #5f4b8b;
            --vibrant-coral: #ff6f61;
            --golden: #ffb347;
            --bg-primary: #fcfcff;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a3d;
            --text-secondary: #4a5568;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
            --shadow-color: rgba(26, 26, 61, 0.1);
        }

        [data-theme="dark"] {
            --deep-indigo: #6b5b95;
            --soft-glow: #9b8bcb;
            --vibrant-coral: #ff8a7a;
            --golden: #ffc46b;
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --card-bg: #2d2d2d;
            --border-color: #404040;
            --shadow-color: rgba(0, 0, 0, 0.3);
        }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .navbar {
            background: var(--bg-secondary) !important;
        }

        [data-theme="dark"] .nav-link {
            color: #e0e0e0 !important;
        }

        .deal-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            background: #ff4444;
            color: white;
            padding: 5px 12px;
            border-radius: 20px;
            font-weight: bold;
        }

        .original-price {
            text-decoration: line-through;
            color: #999;
            font-size: 0.9rem;
        }

        .discount-price {
            color: #ff4444;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .countdown-timer {
            background: var(--deep-indigo);
            color: white;
            padding: 10px;
            border-radius: 8px;
            text-align: center;
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .toast-notification {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--deep-indigo);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .toast-notification.show {
            opacity: 1;
        }

        .card {
            transition: all 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px var(--shadow-color);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="bi bi-bag-heart-fill me-2"></i>
                <span
                    style="background: linear-gradient(145deg, var(--deep-indigo), var(--soft-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AnimateCart</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-semibold gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link active" href="deals.html">Deals</a></li>
                    <li class="nav-item"><a class="nav-link" href="stories.html">Stories</a></li>
                    <li class="nav-item"><a class="nav-link" href="brands.html">Brands</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <div class="theme-toggle me-2" id="themeToggle">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </div>
                    <a href="cart.html" class="btn btn-outline-dark rounded-pill position-relative ripple-btn">
                        <i class="bi bi-cart3"></i> <span id="cartCount"
                            class="badge bg-dark text-white rounded-pill">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="py-5" style="background: linear-gradient(135deg, #ff6f61, #ffb347);">
        <div class="container text-center text-white">
            <h1 class="display-4 fw-bold animate__animated animate__bounceIn">🔥 FLASH DEALS 🔥</h1>
            <p class="lead">Limited time offers - Up to 50% off!</p>
            <div class="countdown-timer d-inline-block mt-3" id="countdown">
                <i class="bi bi-clock"></i> Sale ends in: <span id="timer">--:--:--</span>
            </div>
        </div>
    </section>

    <section class="container py-5">
        <div class="row g-4" id="dealsGrid"></div>
    </section>

    <footer class="bg-dark text-white pt-5 pb-4 mt-5">
        <div class="container text-center">
            <p>© 2026 AnimateCart. All rights reserved.</p>
        </div>
    </footer>

    <div id="liveToast" class="toast-notification"><i class="bi bi-check-circle-fill me-2"></i> <span
            id="toastMsg"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script>
        AOS.init();

        const dealProducts = [
            { id: 1, name: 'Sonic Headphones', price: 79, discount: 40, img: 'https://elements-resized.envatousercontent.com/envato-dam-assets-production/EVA/TRX/67/40/0c/d0/d8/v1_E10/E101BSWN.jpg?w=800&cf_fit=scale-down&mark-alpha=18&mark=https%3A%2F%2Felements-assets.envato.com%2Fstatic%2Fwatermark4.png&q=85&format=auto&s=947197dc8d0b4fe171fc45218815453d7417802aa130b141a4cf9f64ef3762d6' },
            { id: 2, name: 'Smart Hub', price: 59, discount: 30, img: 'https://elements-resized.envatousercontent.com/envato-dam-assets-production/EVA/TRX/ce/fb/24/49/3c/v1_E10/E106Q7Y.jpg?w=800&cf_fit=scale-down&mark-alpha=18&mark=https%3A%2F%2Felements-assets.envato.com%2Fstatic%2Fwatermark4.png&q=85&format=auto&s=727a66244f85b127d380051a1eab9320637f2e704f956ca9aff0f2bc171f0654' },
            { id: 3, name: 'Leather Watch', price: 215, discount: 50, img: 'https://images.pexels.com/photos/190819/pexels-photo-190819.jpeg?w=600' },
            { id: 4, name: 'Earbuds Pro', price: 149, discount: 35, img: 'https://elements-resized.envatousercontent.com/envato-dam-assets-production/EVA/TRX/80/1e/ff/f3/25/v1_E10/E105DP7E.jpg?w=800&cf_fit=scale-down&mark-alpha=18&mark=https%3A%2F%2Felements-assets.envato.com%2Fstatic%2Fwatermark4.png&q=85&format=auto&s=143237b46107f39e6936bd97c1ab6243fa47be02af820da8ba2e71311cdd9fb0' }
        ];

        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function renderDeals() {
            const grid = document.getElementById('dealsGrid');
            let html = '';
            dealProducts.forEach(p => {
                const discountedPrice = (p.price * (100 - p.discount) / 100).toFixed(2);
                html += `
                    <div class="col-md-3">
                        <div class="card border-0 shadow-sm h-100 position-relative">
                            <div class="deal-badge">-${p.discount}%</div>
                            <img src="${p.img}" class="card-img-top" style="height: 200px; object-fit: cover;">
                            <div class="card-body">
                                <h6>${p.name}</h6>
                                <span class="original-price">$${p.price}</span>
                                <span class="discount-price ms-2">$${discountedPrice}</span>
                                <button class="btn btn-primary w-100 mt-3 add-to-cart" data-id="${p.id}" data-name="${p.name}" data-price="${discountedPrice}">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                `;
            });
            grid.innerHTML = html;
            document.querySelectorAll('.add-to-cart').forEach(btn => btn.addEventListener('click', addToCart));
        }

        function addToCart(e) {
            const id = parseInt(e.target.dataset.id);
            const name = e.target.dataset.name;
            const price = parseFloat(e.target.dataset.price);
            cart.push({ id, name, price, quantity: 1 });
            localStorage.setItem('cart', JSON.stringify(cart));
            updateCartCount();
            showToast(`${name} added!`);
        }

        function updateCartCount() {
            document.getElementById('cartCount').innerText = cart.reduce((acc, i) => acc + (i.quantity || 1), 0);
        }

        function showToast(msg) {
            const toast = document.getElementById('liveToast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Countdown Timer
        function startCountdown() {
            const endTime = new Date().getTime() + (24 * 60 * 60 * 1000);
            setInterval(() => {
                const now = new Date().getTime();
                const diff = endTime - now;
                const hours = Math.floor((diff % (24 * 60 * 60 * 1000)) / (60 * 60 * 1000));
                const minutes = Math.floor((diff % (60 * 60 * 1000)) / (60 * 1000));
                const seconds = Math.floor((diff % (60 * 1000)) / 1000);
                document.getElementById('timer').innerHTML = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
            }, 1000);
        }

        function initDarkMode() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
            }
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    themeIcon.classList.replace('bi-sun', 'bi-moon-stars');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        renderDeals();
        updateCartCount();
        startCountdown();
        initDarkMode();
    </script>
</body>

</html>
