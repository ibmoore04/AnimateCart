<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart | AnimateCart</title>
    <link rel="icon" href="./anime.jpg">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    <style>
        :root {
            --deep-indigo: #1a1a3d;
            --soft-glow: #5f4b8b;
            --vibrant-coral: #ff6f61;
            --golden: #ffb347;
            --bg-primary: #fcfcff;
            --bg-secondary: #ffffff;
            --text-primary: #1a1a3d;
            --card-bg: #ffffff;
            --border-color: #dee2e6;
        }

        [data-theme="dark"] {
            --deep-indigo: #6b5b95;
            --bg-primary: #121212;
            --bg-secondary: #1e1e1e;
            --text-primary: #ffffff;
            --card-bg: #2d2d2d;
            --border-color: #404040;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: all 0.3s;
        }

        .navbar {
            background: var(--bg-secondary) !important;
        }

        [data-theme="dark"] .nav-link {
            color: #e0e0e0 !important;
        }

        .cart-item {
            border-bottom: 1px solid var(--border-color);
            padding: 20px 0;
            transition: all 0.3s;
        }

        .cart-item:hover {
            background: var(--bg-secondary);
        }

        .quantity-btn {
            width: 35px;
            height: 35px;
            border: 1px solid var(--border-color);
            background: var(--bg-secondary);
            border-radius: 8px;
            transition: 0.2s;
        }

        .quantity-btn:hover {
            background: var(--deep-indigo);
            color: white;
        }

        .remove-item {
            cursor: pointer;
            transition: 0.2s;
        }

        .remove-item:hover {
            color: red;
            transform: scale(1.1);
        }

        .order-summary {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 24px;
            position: sticky;
            top: 100px;
            border: 1px solid var(--border-color);
        }

        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .toast-notification {
            position: fixed;
            bottom: 25px;
            right: 25px;
            background: var(--deep-indigo);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            z-index: 9999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
        }

        .toast-notification.show {
            opacity: 1;
        }

        .empty-cart {
            text-align: center;
            padding: 60px 20px;
        }

        .checkout-btn {
            background: var(--deep-indigo);
            border: none;
            padding: 14px;
            font-weight: bold;
            transition: 0.3s;
        }

        .checkout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg shadow-sm sticky-top py-3">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="index.html">
                <i class="bi bi-bag-heart-fill me-2"></i>
                <span
                    style="background: linear-gradient(145deg, var(--deep-indigo), var(--soft-glow)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">AnimateCart</span>
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarMain">
                <ul class="navbar-nav mx-auto mb-2 mb-lg-0 fw-semibold gap-3">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="products.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html">Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="deals.html">Deals</a></li>
                    <li class="nav-item"><a class="nav-link" href="stories.html">Stories</a></li>
                    <li class="nav-item"><a class="nav-link" href="brands.html">Brands</a></li>
                </ul>
                <div class="d-flex gap-2">
                    <div class="theme-toggle me-2" id="themeToggle">
                        <i class="bi bi-moon-stars" id="themeIcon"></i>
                    </div>
                    <a href="cart.html" class="btn btn-outline-dark rounded-pill position-relative">
                        <i class="bi bi-cart3"></i> <span id="cartCount"
                            class="badge bg-dark text-white rounded-pill">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <section class="container py-5">
        <h1 class="display-5 fw-bold mb-4">🛒 Shopping Cart</h1>

        <div class="row g-4">
            <div class="col-lg-8">
                <div id="cartItems"></div>
            </div>
            <div class="col-lg-4">
                <div class="order-summary">
                    <h4 class="mb-4">Order Summary</h4>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Subtotal</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="d-flex justify-content-between mb-3">
                        <span>Shipping</span>
                        <span id="shipping">$0.00</span>
                    </div>
                    <hr>
                    <div class="d-flex justify-content-between mb-4">
                        <strong>Total</strong>
                        <strong id="total">$0.00</strong>
                    </div>
                    <button class="btn btn-primary w-100 checkout-btn" id="checkoutBtn">Proceed to Checkout →</button>
                    <a href="products.html" class="btn btn-outline-secondary w-100 mt-3">Continue Shopping</a>
                </div>
            </div>
        </div>
    </section>

    <div id="liveToast" class="toast-notification"><i class="bi bi-check-circle-fill me-2"></i> <span
            id="toastMsg"></span></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        let cart = JSON.parse(localStorage.getItem('cart')) || [];

        function showToast(msg) {
            const toast = document.getElementById('liveToast');
            document.getElementById('toastMsg').innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        function updateCartCount() {
            const count = cart.reduce((acc, i) => acc + (i.quantity || 1), 0);
            document.getElementById('cartCount').innerText = count;
        }

        function renderCart() {
            const container = document.getElementById('cartItems');
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="empty-cart">
                        <i class="bi bi-cart-x fs-1 text-muted"></i>
                        <h3 class="mt-3">Your cart is empty</h3>
                        <p>Looks like you haven't added any items yet</p>
                        <a href="products.html" class="btn btn-primary mt-3">Start Shopping →</a>
                    </div>
                `;
                document.getElementById('subtotal').innerText = '$0.00';
                document.getElementById('shipping').innerText = '$0.00';
                document.getElementById('total').innerText = '$0.00';
                return;
            }

            let html = '';
            let subtotal = 0;

            cart.forEach((item, index) => {
                const itemTotal = item.price * (item.quantity || 1);
                subtotal += itemTotal;
                html += `
                    <div class="cart-item d-flex align-items-center">
                        <div class="flex-grow-1">
                            <h5 class="mb-1">${item.name}</h5>
                            <p class="text-muted mb-0">$${item.price}</p>
                        </div>
                        <div class="d-flex align-items-center gap-2">
                            <button class="quantity-btn" data-index="${index}" data-change="-1">-</button>
                            <span class="mx-2" style="min-width: 30px; text-align: center;">${item.quantity || 1}</span>
                            <button class="quantity-btn" data-index="${index}" data-change="1">+</button>
                            <i class="bi bi-trash3 remove-item ms-3 fs-5" data-index="${index}"></i>
                        </div>
                        <div class="ms-4" style="min-width: 80px; text-align: right;">
                            <strong>$${itemTotal.toFixed(2)}</strong>
                        </div>
                    </div>
                `;
            });

            container.innerHTML = html;

            const shipping = subtotal > 0 ? (subtotal > 100 ? 0 : 10) : 0;
            const total = subtotal + shipping;

            document.getElementById('subtotal').innerText = `$${subtotal.toFixed(2)}`;
            document.getElementById('shipping').innerText = shipping === 0 ? 'FREE' : `$${shipping.toFixed(2)}`;
            document.getElementById('total').innerText = `$${total.toFixed(2)}`;

            document.querySelectorAll('.quantity-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    const index = parseInt(btn.dataset.index);
                    const change = parseInt(btn.dataset.change);
                    if (cart[index]) {
                        const newQty = (cart[index].quantity || 1) + change;
                        if (newQty >= 1) {
                            cart[index].quantity = newQty;
                        } else {
                            cart.splice(index, 1);
                        }
                        localStorage.setItem('cart', JSON.stringify(cart));
                        renderCart();
                        updateCartCount();
                        showToast('Cart updated');
                    }
                });
            });

            document.querySelectorAll('.remove-item').forEach(icon => {
                icon.addEventListener('click', (e) => {
                    const index = parseInt(icon.dataset.index);
                    const removedItem = cart[index];
                    cart.splice(index, 1);
                    localStorage.setItem('cart', JSON.stringify(cart));
                    renderCart();
                    updateCartCount();
                    showToast(`${removedItem.name} removed`);
                });
            });
        }

        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (cart.length === 0) {
                showToast('Your cart is empty!');
            } else {
                showToast('✨ Order placed successfully! ✨');
                cart = [];
                localStorage.setItem('cart', JSON.stringify(cart));
                renderCart();
                updateCartCount();
            }
        });

        function initDarkMode() {
            const themeToggle = document.getElementById('themeToggle');
            const themeIcon = document.getElementById('themeIcon');
            const savedTheme = localStorage.getItem('theme') || 'light';
            if (savedTheme === 'dark') {
                document.documentElement.setAttribute('data-theme', 'dark');
                themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
            }
            themeToggle.addEventListener('click', () => {
                const currentTheme = document.documentElement.getAttribute('data-theme');
                if (currentTheme === 'dark') {
                    document.documentElement.setAttribute('data-theme', 'light');
                    themeIcon.classList.replace('bi-sun', 'bi-moon-stars');
                    localStorage.setItem('theme', 'light');
                } else {
                    document.documentElement.setAttribute('data-theme', 'dark');
                    themeIcon.classList.replace('bi-moon-stars', 'bi-sun');
                    localStorage.setItem('theme', 'dark');
                }
            });
        }

        renderCart();
        updateCartCount();
        initDarkMode();
    </script>
</body>

</html>
